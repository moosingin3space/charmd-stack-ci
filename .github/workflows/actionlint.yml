name: GitHub Actions Lint with actionlint

on:
    workflow_call:

permissions: {}

jobs:
    actionlint:
        name: Run actionlint
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Run actionlint
              uses: docker://rhysd/actionlint:latest
              with:
                  args: -color
