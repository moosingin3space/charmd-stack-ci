name: Dagger Call

on:
    workflow_call:
        inputs:
            dagger-version:
                description: Dagger CLI version to use
                required: false
                type: string
                default: "0.20.3"
            call:
                description: Arguments to pass to `dagger call`
                required: true
                type: string
            environment:
                description: GitHub environment to deploy to (leave empty for non-deployment jobs)
                required: false
                type: string
                default: ""
            runs-on:
                description: Runner label
                required: false
                type: string
                default: ubuntu-latest
        secrets:
            dagger-cloud-token:
                required: false
            cloudflare-api-token:
                required: false
            cloudflare-account-id:
                required: false

permissions: {}

jobs:
    dagger-call:
        name: dagger call ${{ inputs.call }}
        runs-on: ${{ inputs.runs-on }}
        environment: ${{ inputs.environment }}
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Run dagger call
              uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
              with:
                  version: ${{ inputs.dagger-version }}
                  cloud-token: ${{ secrets.dagger-cloud-token }}
                  call: ${{ inputs.call }}
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.cloudflare-api-token }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.cloudflare-account-id }}
